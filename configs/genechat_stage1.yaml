model:
  arch: genechat
  model_type: pretrain_vicuna

  # Stage 1
  freeze_gene_encoder: True
  freeze_adaptor: True
  freeze_llama: False

  max_gene_length: 160000
  gene_pool_width: 300
  
  gene_model: "hyenadna-medium-160k-seqlen"

  llama_model: "/data2/gene_chat/llama_pretrained/vicuna-13b-v1.5"
  prompt: ""

  max_txt_len: 512
  end_sym: "###"
  low_resource: False
  embedding_agg: 1
  peft_ckpt: ''
  stage1_ckpt: ''

datasets:
  seq:
    data_type: gene
    build_info:
      train:
        storage: /data2/gene_chat/exon_count/data/train_without_duplicates

run:
  task: protein_text_pretrain
  # optimizer
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-4
  min_lr: 1e-6
  warmup_lr: 1e-6
  accum_grad_iters: 4

  weight_decay: 0
  max_epoch: 10 #10
  max_iters: 2000000
  iters_per_inner_epoch: 5000

  #iters_per_epoch: 5000
  batch_size_train: 1
  batch_size_eval: 1
  num_workers: 4
  warmup_steps: 2500

  seed: 42
  output_dir: "/data2/gene_chat/exon_count/data/checkpoints"

  amp: True
  resume_ckpt_path: 

  printable: True # whether all ranks can print (True) or only rank 0 can print (False)

  evaluate: False 
  train_splits: ["train"]

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True
  use_dist_eval_sampler: False
